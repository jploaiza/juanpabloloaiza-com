name: Envío automático de recordatorios

on:
  schedule:
    # Corre cada 5 minutos (mínimo garantizado por GitHub Actions)
    - cron: "*/5 * * * *"
  workflow_dispatch: # permite correr manualmente desde GitHub si necesitas probar

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Llamar endpoint de recordatorios
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET \
            "https://www.juanpabloloaiza.com/api/patients/send-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")

          BODY=$(echo "$RESPONSE" | sed -n '1p')
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)

          echo "Status: $STATUS"
          echo "Response: $BODY"

          if [ "$STATUS" != "200" ]; then
            echo "Error: el endpoint respondió con HTTP $STATUS"
            exit 1
          fi
